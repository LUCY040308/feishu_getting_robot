name: Web News Push

on:
  schedule:
    - cron: '25 8 * * *'   # 每天下午4:15本地时间 (UTC+8)
  workflow_dispatch:        # 手动触发用

jobs:
  push-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run main.py
        run: python main.py
